      z-index: 1;
      background: #161f36;
      box-shadow: 0 3px 32px 0 rgba(50,62,104,0.12);
    }
    .header-banner-img {
      width: 100vw;
      min-width: 100vw;
      max-width: none;
      height: 533px;
      object-fit: cover;
      object-position: center 50%;
      position: absolute;
      top: -107px;
      left: 0;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 1200px) {
      .header-banner, .header-banner-img { height: 200px; }

    }
    @media (max-width: 800px) {
      .header-banner, .header-banner-img { height: 120px; }

    .main-card { margin: -80px auto 48px auto; width: 100vw; max-width: 100vw; background: var(--card-bg); box-shadow: 0 8px 32px rgba(33,44,78,0.09), 0 2.5px 16px #527d9b14; border-radius: 20px 20px 22px 22px; padding: 40px 60px 40px 60px;}

    @media (max-width:600px) {.main-card {padding: 18px 2vw 26px 2vw;}}
    .avatar {width: 130px;height: 130px;border-radius: 50%;object-fit: cover;display: block;margin: 0 auto 28px auto;border: 3px solid #fff;box-shadow: 0 8px 24px rgba(33,44,78,0.10);}
    .name { text-align: center; font-size: 36px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .title { text-align: center; font-size: 17px; color: #555; margin-bottom: 42px; font-weight: 500; }
    .section { margin: 0 auto 40px auto; max-width: var(--main-content-width); }
    .section-title { font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 18px; border-bottom: 2px solid var(--accent); padding-bottom: 6px;}

    .bio { font-size: 15.5px; color: #374577; line-height: 2; background: #fbfcfd; border-radius: 10px; padding: 14px 18px; margin-bottom: 0; }
    .contact { font-size: 16px; padding-top: 4px; color: #444; gap: 32px; display: flex; flex-wrap: wrap;}
    .contact span { display: flex; align-items: center; gap: 7px; margin-right: 26px;}
    .lang-switcher{display:flex; gap:8px; justify-content:flex-end; margin:16px 32px 0 0;}
    .lang-btn{background:none;border:none;cursor:pointer;padding:2px;}
    .lang-btn img{width:32px;height:32px;}
    .music-btn {position: fixed; bottom: 24px; right: 28px; z-index: 99; cursor: pointer; transition: opacity .23s;}

      background: #fff;
      border-radius: 18px;

      justify-content:flex-start;

/** 初始化语言/内容（默认中文） **/
function renderLang(lang) {
  document.title = dict.name[lang]+" | "+dict.title[lang];
  document.querySelectorAll('.lang-content').forEach(el => {
    const key = el.getAttribute('data-key');
    // 著作li等内容含HTML
    if(key && key.startsWith('work')) {
      el.innerHTML = dict[key][lang];
    } else {
      el.innerText = dict[key][lang];
    }
  });
  document.getElementById('contact-email').innerText = dict.email[lang];
  document.getElementById('contact-phone').innerText = dict.phone[lang];
}

// 检查上次语言（localStorage），否则默认中文
let lang = localStorage.getItem('lang') || 'zh';
renderLang(lang);

// 语言切换按钮
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.onclick = function() {
    lang = btn.dataset.lang;
    renderLang(lang);
    localStorage.setItem('lang', lang); // 下次自动记忆
  };
});

/** ==================== 背景音乐控制 ==================== **/
const bgMusic = document.getElementById('bg-music');
const musicIcon = document.getElementById('music-icon');
const waves = document.getElementById('waves');
const musicBtn = document.getElementById('music-toggle');

function setMusicPlaying(isPlaying) {
  waves.style.display = isPlaying ? 'block' : 'none';
  document.getElementById('note-head').setAttribute('fill', isPlaying ? '#547ca8' : '#bdc6d5');
}
bgMusic.volume = 0.32;
bgMusic.autoplay = true;

// 自动播放可能被浏览器限制，需用户首次操作
document.addEventListener('DOMContentLoaded',()=>{
  setMusicPlaying(!bgMusic.paused);
  bgMusic.play().catch(()=>{});
});
musicBtn.onclick = () => {
  if(bgMusic.paused){
    bgMusic.play();
    setMusicPlaying(true);
  }else{
    bgMusic.pause();
    setMusicPlaying(false);
  }
};
bgMusic.onplay = ()=>setMusicPlaying(true);
bgMusic.onpause = ()=>setMusicPlaying(false);
</script>
